<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#07111f" />
    <title>OpenEarth XR</title>
  </head>
  <body>
    <main>
      <div id="globe" aria-label="Interactive 3D globe"></div>
      <canvas id="xr-globe" aria-label="Immersive WebXR globe" hidden></canvas>
      <section class="hud" aria-live="polite">
        <p class="eyebrow">OPEN SOURCE · WEBXR FIRST</p>
        <h1>OpenEarth</h1>
        <p class="lede">An open planet viewer—from orbit to streets, desktop to headset.</p>
        <div class="actions">
          <button id="enter-vr" type="button">VR view</button>
          <button id="reset-view" class="secondary" type="button">Reset view</button>
        </div>
        <div class="places" aria-label="Places">
          <button data-place="earth" type="button">Earth</button>
          <button data-place="denmark" type="button">Denmark</button>
          <button data-place="copenhagen" type="button">Copenhagen</button>
        </div>
        <p id="status">Left drag orbits · right drag tilts · wheel flies · double-click travels</p>
      </section>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
